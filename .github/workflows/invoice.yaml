name: Generate invoice PDF
run-name: "Generate invoice ${{ inputs.invoiceId }}"

on:
  workflow_dispatch:
    inputs:
      invoiceId:
        description: "Invoice id like example1, 58, 60b"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-invoice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate PDF
        id: generate
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          INVOICE_TIMEZONE: Pacific/Auckland
        run: |
          OUTPUT=$(npm run generate -- --invoiceId "${{ inputs.invoiceId }}")
          echo "$OUTPUT"
          INVOICE_NUMBER=$(echo "$OUTPUT" | grep -o '"invoiceNumber": "[^"]*"' | cut -d'"' -f4)
          echo "invoice_number=$INVOICE_NUMBER" >> "$GITHUB_OUTPUT"
          EMAIL_NAME=$(echo "$OUTPUT" | grep -o '"emailName": "[^"]*"' | cut -d'"' -f4)
          echo "email_name=$EMAIL_NAME" >> "$GITHUB_OUTPUT"
          PERIOD_START=$(echo "$OUTPUT" | grep -o '"periodStart": "[^"]*"' | cut -d'"' -f4)
          echo "period_start=$PERIOD_START" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.generate.outputs.invoice_number }}
          path: out/*.pdf

      - name: Job summary
        run: |
          PERIOD_START="${{ steps.generate.outputs.period_start }}"
          MONTH_YEAR=$(date -d "$PERIOD_START" +"%Y %B" 2>/dev/null || date -j -f "%Y-%m-%d" "$PERIOD_START" +"%Y %B")
          EMAIL_TITLE="${{ steps.generate.outputs.email_name }} - $MONTH_YEAR Invoice"
          {
            echo "### Email suggestion"
            echo "$EMAIL_TITLE"
            echo ""
            echo "Hello,"
            echo ""
            echo "Here is this month's invoice"
          } >> "$GITHUB_STEP_SUMMARY"