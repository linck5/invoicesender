name: Generate invoice PDF

on:
  workflow_dispatch:
    inputs:
      invoiceId:
        description: "Invoice id like 58, 60b, 61alt"
        required: true
        type: string

jobs:
  build-invoice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate PDF
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          INVOICE_TIMEZONE: Pacific/Auckland
        run: npm run generate -- --invoiceId "${{ inputs.invoiceId }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-pdf
          path: out/*.pdf